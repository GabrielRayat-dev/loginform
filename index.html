<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Form</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Gegegegegegegeg  -->
    <div class="signIn-container">
        <h1>Sign In</h1>
        <p id="quote">Enter your credential to continue</p>
        <form>
            <input class="inp" type="email" required placeholder="Email" >
            <input class="inp" type="password" required placeholder="Password" >

            <div id="rem">
                <div>
                    <input type="checkbox" id="remember">
                    <label for="remember">Remember me</label>
                </div>
                <a href="#" id="forgot">Forgot password?</a>    
            </div>
            
            <button class="inp" id="btn">Sign In</button>
            <p>Don't have an account? <a href="#" id="create">Create one</a> </p>
        </form>
    </div>
</body>
</html>
